apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.app.name }}
  namespace: nimesh-ns
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: duniv
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: duniv
    spec:
      # nodeSelector:
      #   training: devops
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: training
                  operator: In
                  values:
                    - devops
        # preferredDuringSchedulingIgnoredDuringExecution:
        #   - weight: 1
        #     preference:
        #       matchExpressions:
        #         - key: training
        #           operator: In
        #           values:
        #             - devops
      containers:
      - name: duniv-app
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        ports:
        - containerPort: {{ .Values.ports.containerPort }}
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
        env:
          - name: DB_HOST
            valueFrom:
              configMapKeyRef:
                name: duniv-config
                key: DB_HOST
          - name: DB_PORT
            valueFrom:
              configMapKeyRef:
                name: duniv-config
                key: DB_PORT
          - name: DB_USER
            valueFrom:
              secretKeyRef:
                name: duniv-secret
                key: DB_USER
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: duniv-secret
                key: DB_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: duniv-svc
  namespace: nimesh-ns
spec:
  selector:
    app: duniv
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP