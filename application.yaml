apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: duniversity
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/nimeshsv814/Duniversity-College-Portal.git
    targetRevision: master
    path: helm-duniv
    helm:
      values: |
        userprofile:
          activeVersion: blue
  destination:
    server: https://kubernetes.default.svc
    namespace: duniv
  syncPolicy:
    automated:
      prune: true
      selfHeal: true