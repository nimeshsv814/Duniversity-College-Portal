version: '3.8'

services:
  duniversity-portal:
    image: nimeshsv814/duniversity-portal:v1.1.0
    container_name: duniversity-portal
    ports:
      - "81:3000"
    networks:
      - duniversity-net
    env_file:
      - .env

  mariadb:
    image: mariadb:12.3.1-ubi10-rc
    container_name: mariadb
    ports:
      - "3306:3306"
    volumes:
      - duniversity-vol:/data/db
    networks:
      - duniversity-net
    env_file:
      - .env
networks:
  duniversity-net:

volumes:
  duniversity-vol:
